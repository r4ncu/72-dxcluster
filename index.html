<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>72 DX Cluster</title>
<style>
:root{--bg:#111111;--bg2:#1a1a1a;--bg3:#222;--text:#e0e0e0;--text2:#999;--text3:#666;--border:#333;--border2:#2a2a2a;--accent:#2196f3;--accent-hover:#1976d2;--accent-bg:rgba(33,150,243,0.06);--link:#888;--header-bg:#151515;--row-hover:rgba(33,150,243,0.05)}
[data-theme="light"]{--bg:#f5f5f5;--bg2:#fff;--bg3:#f0f0f0;--text:#222;--text2:#555;--text3:#999;--border:#ddd;--border2:#e8e8e8;--accent:#1976d2;--accent-hover:#1565c0;--accent-bg:rgba(25,118,210,0.04);--link:#666;--header-bg:#fff;--row-hover:rgba(25,118,210,0.03)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.container{max-width:900px;margin:0 auto;padding:0 12px}

header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-bottom:12px}
header h1{font-size:17px;font-weight:700;color:var(--text);white-space:nowrap}
header h1 span{font-weight:400;opacity:0.3}

.theme-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.theme-toggle input{display:none}
.theme-toggle .slider{width:52px;height:28px;background:#1a1a2e;border-radius:14px;position:relative;transition:background .3s;border:2px solid #333}
.theme-toggle .slider::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;background:#b3b3b3;border-radius:50%;transition:transform .3s,background .3s}
.theme-toggle .slider .icon-dark{position:absolute;top:5px;right:8px;font-size:13px;color:#ffd700;pointer-events:none}
.theme-toggle .slider .icon-light{position:absolute;top:50%;left:8px;transform:translateY(-50%);font-size:15px;color:#f59e0b;pointer-events:none;display:none}
.theme-toggle input:checked+.slider{background:#e8e8e8;border-color:#ccc}
.theme-toggle input:checked+.slider::after{transform:translateX(24px);background:#808080}
.theme-toggle input:checked+.slider .icon-dark{display:none}
.theme-toggle input:checked+.slider .icon-light{display:block}

.add-form{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
.add-form .field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:90px}
.add-form label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.add-form input{padding:7px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-size:14px;font-weight:600;text-transform:uppercase;outline:none;width:100%}
.add-form input:focus{border-color:var(--accent)}
.add-form input.error{border-color:#f44336}
.add-form .field-comment input{text-transform:none;font-weight:400}
.btn-send{padding:7px 18px;border:none;border-radius:4px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;height:33px}
.btn-send:hover{background:var(--accent-hover)}

.status-bar{font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.status-bar .dot{width:6px;height:6px;background:#4caf50;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.table-wrap{overflow-x:auto;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead th{background:var(--header-bg);color:var(--text2);padding:7px 12px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--accent)}
thead th.sorted{color:var(--accent)}
thead th .arr{margin-left:2px;font-size:9px;opacity:.5}
thead th.sorted .arr{opacity:1}
td{padding:6px 12px;border-bottom:1px solid var(--border2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
tr:hover td{background:var(--row-hover)}
.col-de{font-weight:600}
.col-freq{text-align:right;font-family:"SF Mono",Menlo,monospace;font-size:12px}
.col-dx{font-weight:600}
.col-country{color:var(--text2)}
.col-comment{color:var(--text2);max-width:180px;overflow:hidden;text-overflow:ellipsis}
.col-utc{text-align:right;color:var(--text2);font-family:"SF Mono",Menlo,monospace;font-size:12px}
.col-freq-hdr{text-align:right}
.col-utc-hdr{text-align:right}
.flag{width:18px;height:13px;vertical-align:middle;margin-right:3px;border-radius:1px}
tr.user-spot .col-de::after{content:" [ME]";font-size:10px;color:var(--accent);font-weight:400}

tr.spot-new td{animation:spot-new 10s ease-out}
@keyframes spot-new{0%{background:rgba(76,175,80,0.25)}100%{background:transparent}}

footer{padding:12px 0;text-align:center;border-top:1px solid var(--border2);margin-top:8px}
footer a{font-size:11px;color:var(--text3);text-decoration:none}
footer a:hover{color:var(--accent)}

@media(max-width:600px){
  header h1{font-size:15px}
  header h1 span{display:none}
  .add-form{padding:8px}
  .add-form .field{min-width:calc(50% - 4px);flex:0 0 calc(50% - 4px)}
  .add-form .btn-send{width:100%}
  table{font-size:12px}
  th,td{padding:5px 8px}
  .col-comment{max-width:100px}
}
</style>
</head>
<body>
<div class="container">

<header>
  <h1>72 DX Cluster</h1>
  <label class="theme-toggle">
    <input type="checkbox" id="theme-switch">
    <span class="slider">
      <span class="icon-dark">&#9790;</span>
      <span class="icon-light">&#9728;</span>
    </span>
  </label>
</header>

<div class="add-form">
  <div class="field">
    <label>DE (Spotter)</label>
    <input id="f-de" placeholder="R4NCU" maxlength="10" spellcheck="false" autocomplete="off">
  </div>
  <div class="field" style="max-width:130px">
    <label>Freq, kHz</label>
    <input id="f-freq" placeholder="14060" maxlength="10" inputmode="numeric">
  </div>
  <div class="field">
    <label>DX (Heard)</label>
    <input id="f-dx" placeholder="DL5AW" maxlength="10" spellcheck="false" autocomplete="off">
  </div>
  <div class="field field-comment">
    <label>Comment</label>
    <input id="f-comment" placeholder="optional" maxlength="120">
  </div>
  <button class="btn-send" onclick="submitSpot()">Send</button>
</div>

<div class="status-bar">
  <span class="dot"></span>
  <span id="status">Loading RBN from R4NCU...</span>
</div>

<div class="table-wrap">
  <table id="spots-table">
    <thead>
      <tr>
        <th data-col="de" class="sorted">DE <span class="arr">▲</span></th>
        <th data-col="freq" class="col-freq-hdr">Freq <span class="arr">⇅</span></th>
        <th data-col="dx">DX <span class="arr">⇅</span></th>
        <th data-col="country">Country <span class="arr">⇅</span></th>
        <th data-col="comment">Comment <span class="arr">⇅</span></th>
        <th data-col="time" class="col-utc-hdr">UTC <span class="arr">⇅</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<footer>
  <a href="https://github.com/r4ncu/simple_rbn_spotter" target="_blank">Data: Reverse Beacon Network (R4NCU)</a>
</footer>

</div>

function getPrefix(cs) {
  const m = cs.toUpperCase().match(/^(\d?[A-Z]+)/);
  return m ? m[1].slice(0, 2) : cs.replace(/[^A-Z0-9]/g, "").slice(0, 2);
}

function getFlagUrl(cs) {
  if (!cs) return "";
  const pfx = getPrefix(cs);
  let iso = PREFIX_TO_ISO[pfx];
  if (!iso && pfx.length === 2) iso = PREFIX_TO_ISO[pfx[0]];
  return iso ? "https://flagcdn.com/w40/" + iso + ".png" : "";
}

function getCountry(cs) {
  if (!cs) return "";
  const pfx = getPrefix(cs);
  let iso = PREFIX_TO_ISO[pfx];
  if (!iso && pfx.length === 2) iso = PREFIX_TO_ISO[pfx[0]];
  return ISO_TO_RU[iso] || "";
}

let userSpots = [];
let sortCol = "time";
let sortDir = -1;
let prevRbnIds = new Set();
let prevUserIds = new Set();
let lastRenderedKey = "";
let lastRenderedHTML = "";

document.querySelectorAll("thead th").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    document.querySelectorAll("thead th").forEach(t => t.classList.remove("sorted"));
    th.classList.add("sorted");
    th.querySelector(".arr").textContent = sortDir === 1 ? "▲" : "▼";
    renderAll();
  });
});

function spotKey(s) {
  return s._isUser ? "u" + s._id : "r" + s._rbnId;
}

function buildRowHTML(s) {
  const flag = getFlagUrl(s.dx);
  const flagHtml = flag ? `<img class="flag" src="${flag}" loading="lazy" onerror="this.style.display='none'">` : "";
  const country = getCountry(s.dx);
  const t = s._epoch ? utcTime(s._epoch) : s.time || "";
  const cls = (s._isUser ? "user-spot" : "") + (s._isNew ? " spot-new" : "");
  return `<tr${cls ? ' class="' + cls.trim() + '"' : ''}>` +
    `<td class="col-de">${escHtml(s.de)}</td>` +
    `<td class="col-freq">${escHtml(s.freq)}</td>` +
    `<td class="col-dx">${flagHtml}${escHtml(s.dx)}</td>` +
    `<td class="col-country">${escHtml(country)}</td>` +
    `<td class="col-comment">${escHtml(s.comment || "")}</td>` +
    `<td class="col-utc">${t}</td>` +
    `</tr>`;
}

function renderAll() {
  const all = [...rbnSpots, ...userSpots];
  all.sort((a, b) => {
    if (sortCol === "time") {
      return sortDir * ((a._epoch || 0) - (b._epoch || 0));
    }
    let va = a[sortCol] || "";
    let vb = b[sortCol] || "";
    if (sortCol === "freq") {
      va = parseFloat(va) || 0;
      vb = parseFloat(vb) || 0;
      return sortDir * (va - vb);
    }
    return sortDir * String(va).localeCompare(String(vb));
  });

  const html = all.map(buildRowHTML).join("");
  const key = sortCol + sortDir + all.map(spotKey).join(",");

  if (key === lastRenderedKey) return;

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = html;
  lastRenderedKey = key;
  lastRenderedHTML = html;
}

function utcTime(epoch) {
  const d = new Date(epoch * 1000);
  const hh = String(d.getUTCHours()).padStart(2, "0");
  const mm = String(d.getUTCMinutes()).padStart(2, "0");
  return hh + ":" + mm;
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

async function loadRBN() {
  try {
    const resp = await fetch("/api/rbn?de=" + encodeURIComponent(RBN_CALL) + "&age=" + RBN_AGE);
    const data = await resp.json();
    if (data.error) { setStatus("Error: " + data.error); return; }

    const spots = data.spots || {};
    const newIds = new Set(Object.keys(spots));

    rbnSpots = [];
    Object.entries(spots).forEach(([id, s]) => {
      const [de, freq, dx, snr, wpm, ts, diff, band, type, mode, epoch] = s;
      rbnSpots.push({
        de: de, freq: freq, dx: dx,
        comment: `SNR ${snr} dB`,
        time: utcTime(Number(epoch)),
        _epoch: Number(epoch),
        _isUser: false,
        _isNew: !prevRbnIds.has(id),
        _rbnId: id,
      });
    });

    prevRbnIds = newIds;
    renderAll();
    setStatus(`${rbnSpots.length} spots | ${new Date().toLocaleTimeString("ru-RU", {hour:"2-digit",minute:"2-digit"})}`);
  } catch (e) {
    setStatus("Network error");
  }
}

async function loadUserSpots() {
  try {
    const resp = await fetch("/api/user-spots");
    const data = await resp.json();
    const newIds = new Set(data.map(s => String(s.id)));

    userSpots = data.map(s => ({
      de: s.de, freq: s.freq, dx: s.dx,
      comment: s.comment || "",
      time: utcTime(s.time),
      _epoch: s.time,
      _isUser: true,
      _isNew: !prevUserIds.has(String(s.id)),
      _id: s.id,
    }));

    prevUserIds = newIds;
    renderAll();
  } catch (e) {}
}

function clearError() {
  ["f-de", "f-freq", "f-dx"].forEach(id => {
    document.getElementById(id).classList.remove("error");
  });
}

async function submitSpot() {
  clearError();

  const deEl = document.getElementById("f-de");
  const freqEl = document.getElementById("f-freq");
  const dxEl = document.getElementById("f-dx");
  const commentEl = document.getElementById("f-comment");

  const de = deEl.value.trim().toUpperCase();
  const dx = dxEl.value.trim().toUpperCase();
  const freq = freqEl.value.trim();
  const comment = commentEl.value.trim();

  let hasError = false;
  let firstEmpty = null;
  if (!de) { deEl.classList.add("error"); if (!firstEmpty) firstEmpty = deEl; hasError = true; }
  if (!freq) { freqEl.classList.add("error"); if (!firstEmpty) firstEmpty = freqEl; hasError = true; }
  if (!dx) { dxEl.classList.add("error"); if (!firstEmpty) firstEmpty = dxEl; hasError = true; }
  if (hasError) { firstEmpty.focus(); return; }

  localStorage.setItem("dxcluster-de", de);

  try {
    await fetch("/api/user-spots", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({de, dx, freq, comment}),
    });
    dxEl.value = "";
    freqEl.value = "";
    commentEl.value = "";
    dxEl.focus();
    loadUserSpots();
  } catch (e) {}
}

// Theme
const currentTheme = localStorage.getItem("dxcluster-theme") || "light";
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  document.getElementById("theme-switch").checked = t === "light";
  localStorage.setItem("dxcluster-theme", t);
}
applyTheme(currentTheme);

document.getElementById("theme-switch").addEventListener("change", e => {
  applyTheme(e.target.checked ? "light" : "dark");
});

// Key bindings
["f-de", "f-dx", "f-freq", "f-comment"].forEach(id => {
  document.getElementById(id).addEventListener("keydown", e => {
    if (e.key === "Enter") submitSpot();
  });
  document.getElementById(id).addEventListener("input", () => {
    document.getElementById(id).classList.remove("error");
  });
});

// Remember DE
const savedDe = localStorage.getItem("dxcluster-de");
if (savedDe) {
  document.getElementById("f-de").value = savedDe;
}

// Random DX placeholder
const DX_LIST = ["DH0DK","DJ7XG","DK1HW","E78CB","ER2GF","EU8R","F5GSK","G3XJS","G4MAD","G4UDG","HB9DAX","HB9FIH","I5SKK","IS0FQK","IV3ICH","IZ3AYQ","LZ1WF","OM6TC","ON5SE","OO7Z","R1AR","R1BBG","R1BGK","R1CAF","R1CJ","R1LB","R1OA","R2AJA","R3SAJ","R4NCU","R4WAN","RA1CF","RA1M","RA3AAE","RA3VGS","RA7C","RA7R","RA7RA","RA9AMC","RG1L","RN4R","RT3C","RT7O","RU3NJC","RV3DSA","RV9WIW","RW3DF","RX3DIT","RX3G","RX3PR","SV8CYR","SV8GGI","UA0SBQ","UA1ADF","UA3PMV","UA4NU","UA9CUJ","UB0J","UB3BBB","UB8SBV","YU2TT","YU7AE","YU7RQ","YU7ZB","Z35M"];
document.getElementById("f-dx").placeholder = DX_LIST[Math.floor(Math.random() * DX_LIST.length)];

// Init
loadRBN();
loadUserSpots();
setInterval(loadRBN, RBN_POLL);
setInterval(loadUserSpots, 5000);
</script>
